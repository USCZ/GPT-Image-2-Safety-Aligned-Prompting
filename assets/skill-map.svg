<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">GPT Image 2 Prompt Couture architecture</title>
  <desc id="desc">A clean architecture diagram for a prompt skill that routes user intent into core methods, pattern library, recipes, and final prompts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#18332f" flood-opacity="0.12"/>
    </filter>
    <style>
      .label{font-family:Inter,Arial,sans-serif;fill:#17211f}
      .muted{fill:#52625e}
      .small{font-size:22px}
      .med{font-size:28px;font-weight:700}
      .title{font-size:48px;font-weight:800}
      .card{fill:#ffffff;stroke:#d9e5df;stroke-width:2;rx:18;filter:url(#shadow)}
      .pill{fill:#f4f7f3;stroke:#d7e2dd;stroke-width:1.5;rx:999}
      .line{stroke:#88a8a0;stroke-width:3;fill:none;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1280" height="560" fill="url(#bg)"/>
  <circle cx="1130" cy="76" r="90" fill="#fff2dc"/>
  <circle cx="92" cy="482" r="110" fill="#e2f1ed"/>
  <text x="72" y="88" class="label title">GPT Image 2 Prompt Couture</text>
  <text x="76" y="126" class="label muted small">A skill for routing intent into clean, modular, safety-aligned image prompts.</text>
  <rect x="72" y="184" width="260" height="244" class="card"/>
  <text x="102" y="232" class="label med">User Intent</text>
  <text x="102" y="276" class="label muted small">short idea</text>
  <text x="102" y="312" class="label muted small">locked parameters</text>
  <text x="102" y="348" class="label muted small">image reference</text>
  <text x="102" y="384" class="label muted small">rewrite request</text>
  <path d="M340 306 C390 306 394 306 444 306" class="line"/>
  <rect x="452" y="164" width="360" height="284" class="card"/>
  <text x="492" y="214" class="label med">Skill Router</text>
  <rect x="492" y="252" width="282" height="46" class="pill"/>
  <text x="518" y="283" class="label small">classify image type</text>
  <rect x="492" y="312" width="282" height="46" class="pill"/>
  <text x="518" y="343" class="label small">lock user fields</text>
  <rect x="492" y="372" width="282" height="46" class="pill"/>
  <text x="518" y="403" class="label small">choose output mode</text>
  <path d="M820 306 C870 306 874 306 924 306" class="line"/>
  <rect x="932" y="126" width="276" height="84" class="card"/>
  <text x="966" y="177" class="label med">Core Methods</text>
  <rect x="932" y="238" width="276" height="84" class="card"/>
  <text x="966" y="289" class="label med">Pattern Library</text>
  <rect x="932" y="350" width="276" height="84" class="card"/>
  <text x="966" y="401" class="label med">Prompt Recipes</text>
  <path d="M1068 444 C1068 486 982 496 880 496 C720 496 616 472 616 442" class="line"/>
  <rect x="452" y="472" width="360" height="54" fill="url(#accent)" rx="18"/>
  <text x="520" y="508" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">polished final prompt</text>
</svg>
